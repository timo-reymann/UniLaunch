resolutions:
  issues:
    - message: ".*version conflict.*Microsoft.CodeAnalysis.Common.*"
      reason: "BUILD_TOOL_ISSUE"
      comment: "Known nuget-inspector issue with Microsoft.CodeAnalysis transitive dependency version ranges."
    - message: ".*Timeout.*exceeded.*"
      reason: "SCANNER_ISSUE"
      comment: "Transient timeout during source code scanning."
    - message: ".*Could not resolve Provenance.*"
      reason: "SCANNER_ISSUE"
      comment: "Source provenance cannot be resolved for NuGet binary packages."
    - message: ".*Unable to determine a matching VCS revision.*"
      reason: "SCANNER_ISSUE"
      comment: "VCS revision cannot be matched for NuGet binary packages."
    - message: ".*Downloading source code failed.*"
      reason: "SCANNER_ISSUE"
      comment: "Source code not available for NuGet binary packages."
    - message: ".*DownloadException.*"
      reason: "SCANNER_ISSUE"
      comment: "Source code download failed for NuGet binary packages."
    - message: ".*IOException.*Running.*nuget-inspector.*"
      reason: "BUILD_TOOL_ISSUE"
      comment: "Known nuget-inspector resolution issue."
