resolutions:
  issues:
    - message: ".*version conflict.*Microsoft.CodeAnalysis.Common.*"
      reason: "BUILD_TOOL_ISSUE"
      comment: "Known nuget-inspector issue with Microsoft.CodeAnalysis transitive dependency version ranges."
    - message: ".*IOException.*Running.*nuget-inspector.*"
      reason: "BUILD_TOOL_ISSUE"
      comment: "Known nuget-inspector resolution issue."
    - message: "Could not resolve provenance for package.*"
      reason: "SCANNER_ISSUE"
      comment: "Source provenance cannot be resolved for NuGet binary packages."
    - message: "Could not resolve revision for package.*"
      reason: "SCANNER_ISSUE"
      comment: "VCS revision cannot be resolved for NuGet binary packages."
    - message: "Could not verify existence of source artifact.*"
      reason: "SCANNER_ISSUE"
      comment: "Source artifact not verifiable for NuGet binary packages."
    - message: "Could not find any revision candidates for package.*"
      reason: "SCANNER_ISSUE"
      comment: "No VCS revision candidates found for NuGet binary packages."
    - message: "Failed to scan.*with.*scanner.*"
      reason: "SCANNER_ISSUE"
      comment: "Scanner failed to process package source code."
    - message: "Could not download provenance.*"
      reason: "SCANNER_ISSUE"
      comment: "Source code download failed for package."
    - message: ".*SocketTimeoutException.*"
      reason: "SCANNER_ISSUE"
      comment: "Transient network timeout during scanning."
